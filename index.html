<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Signature Editor</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />

    <!-- Primary SEO & link previews (fallback when OG/Twitter are not used) -->
    <meta
      name="description"
      content="Create and edit HTML email signatures with a live preview. Use a simple guided flow with templates and saved signatures, or switch to advanced mode to edit HTML next to the preview—then copy into Gmail."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://email-signature-editor.pages.dev/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Email Signature Editor" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://email-signature-editor.pages.dev/" />
    <meta property="og:title" content="Email Signature Editor" />
    <meta
      property="og:description"
      content="Create and edit HTML email signatures with a live preview. Guided templates, saved signatures in your browser, optional disclaimer block, and one-click copy for Gmail—free, no install."
    />
    <meta
      property="og:image"
      content="https://email-signature-editor.pages.dev/og.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="2634" />
    <meta property="og:image:height" content="1116" />
    <meta
      property="og:image:alt"
      content="Email Signature Editor — library of saved signatures and create new signature"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Email Signature Editor" />
    <meta
      name="twitter:description"
      content="Create and edit HTML email signatures with a live preview. Guided flow or advanced HTML editor, templates, Gmail-ready copy."
    />
    <meta
      name="twitter:image"
      content="https://email-signature-editor.pages.dev/og.png"
    />
    <meta
      name="twitter:image:alt"
      content="Email Signature Editor — library of saved signatures and create new signature"
    />

    <!-- PWA / browser UI hints -->
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="Email Signature Editor" />
    <meta name="apple-mobile-web-app-title" content="Email Signature Editor" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
